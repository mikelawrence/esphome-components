substitutions:
  ref: main

esphome:
  name: test-ld2410s-rp2
  friendly_name: Test LD2410S Component with RP2

rp2:
  board: rpipicow

external_components:
  source:
    type: git
    url: https://github.com/mikelawrence/esphome-components
    ref: ${ref}
  components: [ ld2410s ]

uart:
  - id: ld2410s_uart
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 115200
    parity: NONE
    stop_bits: 1

ld2410s:
  uart_id: ld2410s_uart

binary_sensor:
  - platform: ld2410s
    has_target:
      name: Has Target
    cal_running:
      name: Cal Running

button:
  - platform: ld2410s
    cal_start:
      name: Cal Start

number:
  - platform: ld2410s
    max_detect_gate:
      name: Max Detect Gate
    min_detect_gate:
      name: Min Detect Gate
    no_delay:
      name: No Detect Report Delay
    status_reporting_frequency:
      id: status_reporting_frequency
    distance_reporting_frequency:
      id: distance_reporting_frequency
    g0:
      trigger_threshold:
        name: G0 Trigger Threshold
      hold_threshold:
        name: G0 Hold Threshold
